<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신혼여행 일정 지도</title>
    <style>
        :root {
            --bg: #f8f5ef; --panel: #fffdf9; --text: #24313a; --muted: #64707b;
            --accent: #ff7a59; --accent-2: #2f6f8f; --line: #e6dccf;
            --shadow: 0 18px 45px rgba(36, 49, 58, 0.08);
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Pretendard", sans-serif; color: var(--text); background: linear-gradient(180deg, #fffdf9 0%, var(--bg) 100%); line-height: 1.6; }
        a { color: inherit; text-decoration: none; }
        .page { max-width: 1320px; margin: 0 auto; padding: 24px; }
        .hero { padding: 32px; border-radius: 30px; background: linear-gradient(135deg, rgba(47, 111, 143, 0.95), rgba(255, 122, 89, 0.9)); color: white; box-shadow: var(--shadow); }
        .hero h1 { font-size: clamp(1.9rem, 3.5vw, 2.8rem); margin: 8px 0 10px; line-height: 1.2; }
        .chip-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .chip { border: 0; border-radius: 999px; padding: 10px 14px; background: rgba(255, 255, 255, 0.22); color: white; cursor: pointer; font-weight: 600; }
        .chip.active { background: white; color: var(--accent-2); }
        .layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 22px; margin-top: 22px; }
        .card { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; box-shadow: var(--shadow); padding: 22px; }
        .card-title { font-size: 1.12rem; font-weight: 700; margin-bottom: 16px; color: var(--accent-2); }
        .date-group { margin-bottom: 18px; }
        .date-title { font-weight: 700; color: var(--accent-2); margin-bottom: 10px; font-size: 0.98rem; }
        .schedule-item { width: 100%; border: 1px solid var(--line); border-radius: 16px; background: #fff; padding: 14px 14px 14px 16px; margin-bottom: 10px; text-align: left; cursor: pointer; transition: 0.2s; }
        .schedule-item:hover { border-color: rgba(255, 122, 89, 0.55); box-shadow: 0 8px 22px rgba(255, 122, 89, 0.12); }
        .schedule-item.active { border-color: var(--accent); background: #fff8f4; }
        .schedule-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .time-badge { min-width: 70px; font-weight: 700; color: var(--accent); }
        .place-name { font-size: 1rem; font-weight: 700; }
        .map-link { width: 36px; height: 36px; border-radius: 50%; background: #f6efe8; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .map-box { border-radius: 20px; overflow: hidden; border: 1px solid var(--line); background: #f4efe8; min-height: 380px; }
        .map-box svg { width: 100%; height: 320px; display: block; }
        .map-pin circle { cursor: pointer; }
        .map-pin.active circle { fill: var(--accent); stroke: #fff; stroke-width: 2.2; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @media (max-width: 960px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>

<body>
    <div class="page">
        <section class="hero">
            <h1>부다페스트와 빈을 따라가는 10일 신혼여행</h1>
            <div class="chip-row" id="dateFilters"></div>
        </section>

        <main class="layout">
            <section class="card">
                <div class="card-title">타임테이블</div>
                <div id="timelineList"></div>
            </section>
            <aside class="card">
                <div class="card-title">여행 지도</div>
                <div class="map-box"><svg id="tripMap" viewBox="0 0 100 100"></svg></div>
                <div id="mapSummary" style="margin-top:15px; color:var(--muted)">선택한 일정이 없습니다.</div>
            </aside>
        </main>
    </div>

    <script>
        let itineraryData = [];
        let selectedDate = 'all';
        let activePlace = null;

        async function loadData() {
            try {
                const response = await fetch('./data.json');
                itineraryData = await response.json();
                renderUI();
            } catch (e) { console.error("데이터 로드 실패"); }
        }

        function renderUI() {
            const dates = ['all', ...new Set(itineraryData.map(i => i.date))];
            dateFilters.innerHTML = dates.map(d => `<button class="chip ${selectedDate === d ? 'active' : ''}" onclick="filter('${d}')">${d === 'all' ? '전체' : d}</button>`).join('');
            
            const filtered = selectedDate === 'all' ? itineraryData : itineraryData.filter(i => i.date === selectedDate);
            const groups = filtered.reduce((acc, cur) => { (acc[cur.date] = acc[cur.date] || []).push(cur); return acc; }, {});
            
            timelineList.innerHTML = Object.entries(groups).map(([date, items]) => `
                <div class="date-group"><div class="date-title">${date}</div>
                ${items.map(item => `
                    <article class="schedule-item ${activePlace === item.place ? 'active' : ''}" onclick="setActive('${item.place}')">
                        <div class="schedule-row">
                            <div class="time-badge">${item.time}</div>
                            <div class="schedule-content">
                                <div class="place-name">${item.place}</div>
                                <p class="schedule-desc">${item.desc}</p>
                            </div>
                            <a class="map-link" href="${item.link}" target="_blank" onclick="event.stopPropagation()">🗺️</a>
                        </div>
                    </article>
                `).join('')}</div>`).join('');

            renderMap(filtered);
        }

        function filter(date) { selectedDate = date; renderUI(); }
        function setActive(place) { activePlace = place; renderUI(); }

        function renderMap(items) {
            const places = [...new Set(items.map(i => i.place))];
            tripMap.innerHTML = places.map((p, i) => {
                const x = 15 + (i * (70 / (places.length || 1)));
                const y = 30 + (Math.sin(i) * 20);
                return `<g class="map-pin ${activePlace === p ? 'active' : ''}" onclick="setActive('${p}')">
                    <circle cx="${x}" cy="${y}" r="3" fill="${activePlace === p ? '#ff7a59' : '#2f6f8f'}"></circle>
                    <text x="${x}" y="${y - 5}" font-size="3" text-anchor="middle">${p}</text>
                </g>`;
            }).join('');
        }

        loadData();
    </script>
</body>
</html>
