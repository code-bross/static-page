<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신혼여행 일정 지도</title>
    <!-- Leaflet 지도 라이브러리 CSS 추가 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #f8f5ef;
            --panel: #fffdf9;
            --text: #24313a;
            --muted: #64707b;
            --accent: #ff7a59;
            --accent-2: #2f6f8f;
            --line: #e6dccf;
            --shadow: 0 18px 45px rgba(36, 49, 58, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Pretendard", sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #fffdf9 0%, var(--bg) 100%);
            line-height: 1.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px;
        }

        .hero {
            padding: 32px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(47, 111, 143, 0.95), rgba(255, 122, 89, 0.9));
            color: white;
            box-shadow: var(--shadow);
        }

        .hero h1 {
            font-size: clamp(1.9rem, 3.5vw, 2.8rem);
            margin: 8px 0 10px;
            line-height: 1.2;
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .chip {
            border: 0;
            border-radius: 999px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.22);
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .chip.active {
            background: white;
            color: var(--accent-2);
        }

        .layout {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 22px;
            margin-top: 22px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 22px;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.12rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--accent-2);
        }

        .timeline-container {
            overflow-y: auto;
            max-height: 700px;
            padding-right: 8px;
        }

        .date-group {
            margin-bottom: 18px;
        }

        .date-title {
            font-weight: 700;
            color: var(--accent-2);
            margin-bottom: 10px;
            font-size: 0.98rem;
        }

        .schedule-item {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: #fff;
            padding: 14px 14px 14px 16px;
            margin-bottom: 10px;
            text-align: left;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
            overflow: hidden;
        }

        .schedule-item:hover {
            border-color: rgba(255, 122, 89, 0.55);
            box-shadow: 0 8px 22px rgba(255, 122, 89, 0.12);
        }

        .schedule-item.active {
            border-color: var(--accent);
            background: #fff8f4;
        }

        .schedule-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .time-badge {
            min-width: 70px;
            font-weight: 700;
            color: var(--accent);
        }

        .schedule-content {
            flex-grow: 1;
        }

        .place-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .schedule-desc {
            margin: 2px 0 0;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .schedule-details {
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out, margin-top 0.3s ease;
            overflow: hidden;
        }

        .schedule-item.active .schedule-details {
            max-height: 1200px;
            opacity: 1;
            margin-top: 14px;
            border-top: 1px dashed var(--line);
            padding-top: 14px;
        }

        .detail-text {
            color: var(--text);
            font-size: 0.93rem;
            margin: 0 0 10px 0;
            white-space: pre-wrap;
        }

        .guide-box {
            background-color: #f1ebd9;
            border-left: 4px solid var(--accent-2);
            padding: 8px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            color: #3b4952;
            margin-bottom: 14px;
        }

        .img-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .detail-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--line);
            background-color: #eee;
        }

        .map-link {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f6efe8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .map-link:hover {
            background: var(--line);
        }

        .map-box {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--line);
            background: #f4efe8;
            height: 550px;
            width: 100%;
            z-index: 1;
        }

        @media (max-width: 960px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .map-box {
                height: 400px;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <section class="hero">
            <h1>유럽 신혼여행 일정 지도</h1>
            <div class="chip-row" id="dateFilters"></div>
        </section>

        <main class="layout">
            <section class="card">
                <div class="card-title">타임테이블</div>
                <div class="timeline-container" id="timelineList"></div>
            </section>
            <aside class="card">
                <div class="card-title">여행 지도</div>
                <div id="tripMap" class="map-box"></div>
                <div id="mapSummary" style="margin-top:15px; color:var(--muted); font-weight: 600;"></div>
            </aside>
        </main>
    </div>

    <!-- Leaflet 지도 라이브러리 스크립트 추가 -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let selectedDate = 'all';
        let activePlace = null;
        let map = null;
        let markerLayer = null;
        let polylineLayer = null;
        let markersMap = {};

        // 데이터 원본을 주석 없이 변수에 직접 바인딩합니다[cite: 4].
        let itineraryData = [];

        async function loadData() {
            try {
                const response = await fetch('./data.json'); // 경로가 정확한지 확인
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                itineraryData = data;
            } catch (error) {
                console.error("데이터 로드 실패:", error);
            }
        }

        function initMap() {
            map = L.map('tripMap').setView([47.8, 17.5], 7);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);

            markerLayer = L.layerGroup().addTo(map);
            polylineLayer = L.layerGroup().addTo(map);

            // 파일 로드 과정 없이 즉시 렌더링을 호출합니다.
            renderUI();
        }

        function renderUI() {
            const dateFilters = document.getElementById('dateFilters');
            if (itineraryData.length === 0) {
                document.getElementById('timelineList').innerHTML = '<div style="padding:20px; text-align:center; color:var(--muted);">일정 데이터가 비어있거나 올바르지 않습니다.</div>';
                return;
            }

            const dates = ['all', ...new Set(itineraryData.map(i => i.date))];
            dateFilters.innerHTML = dates.map(d => `<button class="chip ${selectedDate === d ? 'active' : ''}" onclick="filter('${d}')">${d === 'all' ? '전체' : d}</button>`).join('');

            const filtered = selectedDate === 'all' ? itineraryData : itineraryData.filter(i => i.date === selectedDate);
            const timelineList = document.getElementById('timelineList');
            const groups = filtered.reduce((acc, cur) => { (acc[cur.date] = acc[cur.date] || []).push(cur); return acc; }, {});

            timelineList.innerHTML = Object.entries(groups).map(([date, items]) => `
                <div class="date-group"><div class="date-title">📅 ${date}</div>
                ${items.map(item => {
                const uniqueId = btoa(encodeURIComponent(item.place + item.time)).replace(/=/g, '');

                const detailsHtml = item.details ? `<p class="detail-text">${item.details}</p>` : '';
                const guideHtml = item.guide ? `<div class="guide-box">💡 <strong>안내:</strong> ${item.guide}</div>` : '';

                let imagesHtml = '';
                if (item.imgs && Array.isArray(item.imgs) && item.imgs.length > 0) {
                    imagesHtml = `<div class="img-grid">${item.imgs.map(url => `
                            <img src="${url}" class="detail-img" alt="${item.place} 이미지" onerror="this.style.display='none'">
                        `).join('')}</div>`;
                }

                return `
                    <article class="schedule-item ${activePlace === item.place ? 'active' : ''}" id="item-${uniqueId}" onclick="setActive('${item.place}', '${item.time}')">
                        <div class="schedule-row">
                            <div class="time-badge">${item.time}</div>
                            <div class="schedule-content">
                                <div class="place-name">${item.place}</div>
                                <p class="schedule-desc">${item.desc || ''}</p>
                            </div>
                            <a class="map-link" href="${item.link}" target="_blank" onclick="event.stopPropagation()">🗺️</a>
                        </div>
                        <div class="schedule-details">
                            ${detailsHtml}
                            ${guideHtml}
                            ${imagesHtml}
                        </div>
                    </article>
                `}).join('')}</div>`).join('');

            updateMap(filtered);
        }

        function filter(date) {
            selectedDate = date;
            activePlace = null;
            renderUI();
        }

        function setActive(place, time) {
            activePlace = place;

            document.querySelectorAll('.schedule-item').forEach(el => el.classList.remove('active'));

            const uniqueId = btoa(encodeURIComponent(place + time)).replace(/=/g, '');
            const activeEl = document.getElementById(`item(` + 'item-' + uniqueId + ')');

            // ID 매핑 보정
            const correctEl = document.getElementById(`item-${uniqueId}`);
            if (correctEl) {
                correctEl.classList.add('active');
            }

            if (markersMap[place]) {
                const marker = markersMap[place];
                map.setView(marker.getLatLng(), 14, { animate: true, duration: 0.6 });
                marker.openPopup();
            }

            document.getElementById('mapSummary').innerHTML = `📍 <strong>${place}</strong> 스팟 정보를 확인 중입니다.`;
        }

        function updateMap(items) {
            markerLayer.clearLayers();
            polylineLayer.clearLayers();
            markersMap = {};

            const validItems = items.filter(i => i.lat && i.lng);
            const lineCoordinates = validItems
                .filter(i => !i.place.includes('인천국제공항'))
                .map(i => [i.lat, i.lng]);

            if (validItems.length === 0) return;

            validItems.forEach((item) => {
                const isSelected = activePlace === item.place;
                const markerColor = isSelected ? '#ff7a59' : '#2f6f8f';

                const customMarker = L.circleMarker([item.lat, item.lng], {
                    radius: isSelected ? 10 : 7,
                    fillColor: markerColor,
                    color: '#fff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.9
                });

                customMarker.bindPopup(`<strong>${item.place}</strong><br><span style="font-size:11px; color:#666;">${item.time} - ${item.desc || ''}</span>`);

                customMarker.on('click', () => {
                    setActive(item.place, item.time);
                });

                customMarker.addTo(markerLayer);
                markersMap[item.place] = customMarker;
            });

            if (lineCoordinates.length > 1) {
                L.polyline(lineCoordinates, {
                    color: 'var(--accent)',
                    weight: 3,
                    opacity: 0.6,
                    dashArray: '6, 6'
                }).addTo(polylineLayer);
            }

            const mapBoundsItems = selectedDate === 'all'
                ? validItems.filter(i => !i.place.includes('인천국제공항'))
                : validItems;

            const targetBounds = mapBoundsItems.length > 0 ? mapBoundsItems : validItems;
            const bounds = L.latLngBounds(targetBounds.map(i => [i.lat, i.lng]));
            map.fitBounds(bounds, { padding: [40, 40] });

            const summaryEl = document.getElementById('mapSummary');
            if (selectedDate === 'all') {
                summaryEl.innerHTML = "💡 리스트의 일정을 클릭하면 상세 내용과 이미지가 펼쳐집니다.";
            } else {
                summaryEl.innerHTML = `📅 ${selectedDate} 일정 내 총 ${validItems.length}개의 거점이 표기되었습니다.`;
            }
        }

        loadData();

        window.onload = initMap;
    </script>
</body>

</html>
